<div class="dropdown" (click)="onToggle(); $event.stopPropagation()">

@if (options(); as opts) {

  <div class="dropdown__selected">
    @if (selected(); as sel) {
   
      <div class="icon-wrapper">
        <img [ngSrc]="sel.image" fill class="coin-icon"/>
      </div>
      <span class="dropdown__selected-text">
        {{ sel.name }} ({{ sel.symbol | uppercase }})
      </span>

    }
  </div>

  @if (isOpen()) {
    <ul class="dropdown__list">

      @for (option of opts; track option.id) {
        <li
          class="dropdown__item"
          (click)="onSelect(option); $event.stopPropagation()">

          {{ option.name }} ({{ option.symbol | uppercase }})
        </li>
      }

    </ul>
  }

}

</div>
