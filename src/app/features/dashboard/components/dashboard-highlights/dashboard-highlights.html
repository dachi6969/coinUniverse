<div class="card_section_wrap">

@if ( hightlightsData(); as hd ) {

    <highlight-card [data]="hd.btc ?? null"></highlight-card>

    <highlight-card [data]="hd.topGainer"></highlight-card>

    <highlight-card [data]="hd.topLoser"></highlight-card>

    <highlight-card [data]="hd.topVolume"></highlight-card>

  } 
  @else {
    @for (item of [1,2,3,4]; track $index) {
      <highlight-skeleton class="skeleton">
      </highlight-skeleton>
    }
  } 
</div>
