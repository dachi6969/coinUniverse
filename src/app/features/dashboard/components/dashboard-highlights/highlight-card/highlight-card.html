@if ( data(); as data ) {
    <div class="highlight-card">
        <div class="card_header">
            <img [src]="data.image" width="32" height="32" />
            <h3 class="title">
                {{ data.name }} ({{ data.symbol | uppercase}})
            </h3>
        </div>
    
        <div 
        class="asset-price price-cell" 
        [priceHighlight]="data.current_price"
        >
            ${{ data.current_price | number: '1.2-4' }}
        </div>
    
        <div 
        class="asset-change"
        BenefitIndicator
        >
            {{ data.price_change_percentage_24h | number:'1.2-2' }}%
        </div>
    </div>
}
