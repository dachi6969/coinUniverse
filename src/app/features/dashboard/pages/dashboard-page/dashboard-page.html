<main class="dashboard_wrap">

    <dashboard-highlights 
    [hightlightsData]="dashboardData$ | async"
    ></dashboard-highlights>

    <div class="dashboard-content_wraper">
        <div class="box box1">
            <main-chart-content
            [perDayPrice]="last24hPrices$ | async"
            [selectedCoin]="(selectedCoin$ | async) ?? null"
            [top100coins]="top100staticCoins$ | async"
            [isChartError]="isChartError()"
            (select)="onSelect($event)"
            (retry)="onRetry()"
            ></main-chart-content>
        </div>
        <div class="box box2">
            <top-performers-table 
            [top100Coins]="top100LiveCoins$ | async"
            ></top-performers-table>
        </div>
        <div class="box box3">
            <top-exchanges-table 
            [data]="cryptoExchanges$ | async"
            ></top-exchanges-table>
        </div>
    </div>

</main>
