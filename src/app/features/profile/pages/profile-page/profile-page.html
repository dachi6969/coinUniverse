<main class="dashboard_wrap">

    <div class="dashboard-content_wraper">
        <div class="box box1">
            <profile-overview 
            [user]="user()" 
            [userStatus]="userStatus()"
            ></profile-overview>
        </div>
        <div class="box box2">
            <login-history-table 
            [history]="loginHistory()"
            ></login-history-table>
        </div>
        <div class="box box3">
            <account-settings></account-settings>
        </div>
        <div class="box box4">
            <account-deletion 
            (canDelete)="onDeleteAccount()"
            [pending]="pending()"
            ></account-deletion>
        </div>
    </div>

</main>
