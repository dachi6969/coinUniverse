<dialog open class="crypto-modal">
  @if ( coin(); as c ) {
    <div class="modal-header">
      <h3>Buy {{ c.name }}</h3>
      <button 
      class="close-btn"
      (click)="exit.emit()"
      >
      x
      </button>
    </div>
  
    <div class="modal-body">
      <div class="coin-info">
        <span class="label">Current Price:</span>
        <span class="value">
          ${{ livePrice() | number: '1.2-6' }}
        </span>
      </div>
  
      <div class="input-group">
        <label for="amount">
          Max amount: {{ livePrice() | maxAmount: balance() }}
        </label>
        <input
        type="number"
        id="amount"
        placeholder="0.00"
        step="0.1"
        [(ngModel)]="inputVal"
        appCryptoInput
        [decimals]="3"
        [maxAmount]="balance() / livePrice()"
      />
      </div>
  
      <div class="balance-info">
        <span>Your Balance:</span>
        <span class="balance-value">
          {{ balance() | currency }}
        </span>
      </div>
    </div>
  
    <div class="modal-footer">
      <ui-button
      variant="filled"
      color="secondary"
      [fullWidth]="true"
      style="flex: 1;"
      [disabled]="loading()"
      (onClick)="exit.emit()"
      >
      Cancel
      </ui-button>

      <ui-button
      style="flex: 1;"
      variant="filled"
      color="success"
      [fullWidth]="true"
      (onClick)="onBuy(c)"
      [disabled]="!inputVal() || loading()"
      [loading]="loading()"
      >
        ${{ priceToBuy() | number: '1.2-2'}}
      </ui-button>

    </div>
  }
</dialog>
<div class="modal-backdrop"></div>
